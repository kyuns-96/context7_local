name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build standalone binary
        run: |
          mkdir -p .tmp
          bun build --compile src/server/index.ts --outfile .tmp/context7-local

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: context7-local-linux
          path: .tmp/context7-local
